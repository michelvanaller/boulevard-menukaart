<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beheerpagina — Boulevardhotel Menukaart</title>
<style>
  :root {
    --green: #4e8f87;
    --blue: #006C89;
    --gold: #EAA351;
    --text: #1c1c1c;
    --muted: #6b6b6b;
    --border: #e0e0e0;
    --bg: #f4f8f7;
    --white: #ffffff;
    --radius: 10px;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  .topbar { background: var(--green); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; }
  .topbar span { font-size: 0.78rem; opacity: 0.75; }
  .save-btn { background: var(--gold); color: #4a2e00; border: none; padding: 8px 20px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .save-btn:hover { background: #d4903a; }

  .layout { display: flex; min-height: calc(100vh - 50px); }
  .sidebar { width: 220px; background: var(--white); border-right: 1px solid var(--border); padding: 1rem 0; flex-shrink: 0; }
  .sidebar-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0 16px 8px; }
  .cat-btn { width: 100%; text-align: left; padding: 10px 16px; border: none; background: none; font-size: 0.88rem; color: var(--text); cursor: pointer; border-left: 3px solid transparent; }
  .cat-btn:hover { background: var(--bg); }
  .cat-btn.active { border-left-color: var(--green); color: var(--green); font-weight: 500; background: #edf5f4; }
  .cat-count { float: right; font-size: 0.75rem; color: var(--muted); background: #eee; border-radius: 99px; padding: 1px 7px; }

  .main { flex: 1; padding: 1.5rem 2rem; }
  .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .main-header h2 { font-size: 1.1rem; font-weight: 600; color: var(--blue); }
  .add-btn { background: var(--blue); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 0.83rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .add-btn:hover { background: #005572; }

  .item-grid { display: flex; flex-direction: column; gap: 10px; }
  .item-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: grid; grid-template-columns: 72px 1fr auto; gap: 12px; align-items: center; }
  .item-thumb { width: 72px; height: 56px; border-radius: 6px; object-fit: cover; background: #eee; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); text-align: center; overflow: hidden; flex-shrink: 0; }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }
  .item-fields { display: grid; grid-template-columns: 1fr 1fr 90px; gap: 8px; }
  .item-fields input { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.83rem; color: var(--text); background: var(--white); width: 100%; }
  .item-fields input:focus { outline: none; border-color: var(--green); }
  .item-fields input.desc { grid-column: 1 / 3; }
  .item-actions { display: flex; flex-direction: column; gap: 6px; }
  .del-btn { background: none; border: 1px solid #e0c0c0; color: var(--danger); border-radius: 6px; padding: 6px 10px; font-size: 0.78rem; cursor: pointer; }
  .del-btn:hover { background: #fdf0f0; }
  .photo-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 10px; font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
  .photo-btn:hover { border-color: var(--green); color: var(--green); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 12px; padding: 1.5rem; width: 420px; max-width: 95vw; }
  .modal h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--blue); }
  .modal label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 10px; }
  .modal input, .modal select { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 0.88rem; }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--green); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
  .modal-btns button { padding: 8px 18px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--white); }
  .modal-btns .confirm { background: var(--green); color: #fff; border-color: var(--green); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #1c1c1c; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; }

  input[type="file"] { display: none; }

  .subcats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .subcat-btn { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--white); font-size: 0.78rem; cursor: pointer; color: var(--muted); }
  .subcat-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Menukaart beheer — Boulevardhotel Scheveningen</h1>
    <span>Wijzigingen worden opgeslagen in de browser en zichtbaar op de menukaart</span>
  </div>
  <button class="save-btn" onclick="saveAll()">⬇ Download index.html voor GitHub</button>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Categorieën</div>
    <div id="sidebar-cats"></div>
  </div>
  <div class="main">
    <div class="main-header">
      <h2 id="cat-title">Gerechten</h2>
      <button class="add-btn" onclick="openAddModal()">+ Item toevoegen</button>
    </div>
    <div id="subcats" class="subcats"></div>
    <div class="item-grid" id="item-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Item toevoegen</h3>
    <label>Naam</label>
    <input type="text" id="m-name" placeholder="Biefstuk menu">
    <label>Omschrijving (optioneel)</label>
    <input type="text" id="m-desc" placeholder="Met seizoensgroenten">
    <label>Prijs (€)</label>
    <input type="text" id="m-price" placeholder="29,00">
    <label>Sectie / subcategorie</label>
    <input type="text" id="m-section" placeholder="Hoofdgerechten">
    <div class="modal-btns">
      <button onclick="closeModal()">Annuleren</button>
      <button class="confirm" onclick="confirmAdd()">Toevoegen</button>
    </div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*">
<div class="toast" id="toast"></div>

let currentSubcat = null;
let pendingPhotoId = null;
let nextId = 1000;

function loadSidebar() {
  const el = document.getElementById('sidebar-cats');
  el.innerHTML = Object.keys(data).map(cat => {
    const count = data[cat].items.length;
    return `<button class="cat-btn ${cat === currentCat ? 'active' : ''}" onclick="selectCat('${cat}')">${cat}<span class="cat-count">${count}</span></button>`;
  }).join('');
}

function selectCat(cat) {
  currentCat = cat;
  currentSubcat = null;
  loadSidebar();
  renderItems();
}

function renderItems() {
  document.getElementById('cat-title').textContent = currentCat;
  const cat = data[currentCat];

  const subcatEl = document.getElementById('subcats');
  subcatEl.innerHTML = `<button class="subcat-btn ${!currentSubcat ? 'active' : ''}" onclick="filterSubcat(null)">Alles</button>` +
    cat.subcats.map(s => `<button class="subcat-btn ${currentSubcat === s ? 'active' : ''}" onclick="filterSubcat('${s}')">${s}</button>`).join('');

  const items = currentSubcat ? cat.items.filter(i => i.section === currentSubcat) : cat.items;
  const grid = document.getElementById('item-grid');

  grid.innerHTML = items.map(item => `
    <div class="item-card" id="card-${item.id}">
      <div class="item-thumb" onclick="triggerPhoto(${item.id})" title="Klik om foto te uploaden">
        ${item.photo ? `<img src="${item.photo}" alt="">` : '<span>+ foto</span>'}
      </div>
      <div class="item-fields">
        <input type="text" value="${esc(item.name)}" placeholder="Naam" onchange="updateField(${item.id},'name',this.value)">
        <input type="text" value="${esc(item.price)}" placeholder="Prijs" onchange="updateField(${item.id},'price',this.value)" style="max-width:90px;">
        <input type="text" value="${esc(item.section)}" placeholder="Sectie" onchange="updateField(${item.id},'section',this.value)">
        <input type="text" class="desc" value="${esc(item.desc)}" placeholder="Omschrijving (optioneel)" onchange="updateField(${item.id},'desc',this.value)">
      </div>
      <div class="item-actions">
        <button class="photo-btn" onclick="triggerPhoto(${item.id})">📷 Foto</button>
        <button class="del-btn" onclick="deleteItem(${item.id})">Verwijder</button>
      </div>
    </div>
  `).join('');
}

function filterSubcat(s) {
  currentSubcat = s;
  renderItems();
}

function esc(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function updateField(id, field, value) {
  const cat = data[currentCat];
  const item = cat.items.find(i => i.id === id);
  if (item) {
    item[field] = value;
    if (field === 'section' && !cat.subcats.includes(value)) {
      cat.subcats.push(value);
    }
    persist();
  }
}

function deleteItem(id) {
  if (!confirm('Item verwijderen?')) return;
  data[currentCat].items = data[currentCat].items.filter(i => i.id !== id);
  persist();
  renderItems();
  loadSidebar();
}

function triggerPhoto(id) {
  pendingPhotoId = id;
  document.getElementById('photo-input').click();
}

document.getElementById('photo-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file || !pendingPhotoId) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const item = data[currentCat].items.find(i => i.id === pendingPhotoId);
    if (item) {
      item.photo = ev.target.result;
      persist();
      renderItems();
      showToast('Foto opgeslagen');
    }
  };
  reader.readAsDataURL(file);
  this.value = '';
});

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Item toevoegen aan ' + currentCat;
  document.getElementById('m-name').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('m-price').value = '';
  document.getElementById('m-section').value = data[currentCat].subcats[0] || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function confirmAdd() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Vul een naam in'); return; }
  const item = {
    id: nextId++,
    name,
    desc: document.getElementById('m-desc').value.trim(),
    price: document.getElementById('m-price').value.trim(),
    section: document.getElementById('m-section').value.trim() || data[currentCat].subcats[0],
    photo: ''
  };
  const cat = data[currentCat];
  cat.items.push(item);
  if (item.section && !cat.subcats.includes(item.section)) cat.subcats.push(item.section);
  persist();
  closeModal();
  renderItems();
  loadSidebar();
  showToast('Item toegevoegd');
}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveAll() {
  persist();
  downloadMenukaart();
}
